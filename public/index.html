<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Altercadia.online</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/app-ui/ui-runtime.css" />
    <link rel="modulepreload" href="/app-ui/ui-runtime.js" />
    <script>
      (function () {
        var CANONICAL = 'https://altercadia-online.vercel.app';
        var search = window.location.search;
        var hash = window.location.hash || '';
        var host = window.location.hostname || '';
        var isPreview =
          host.indexOf('-projects.vercel.app') !== -1 ||
          (host.slice(-12) === '.vercel.app' && host !== 'altercadia-online.vercel.app');
        var isOAuthReturn =
          /(?:[?&]code=|[?&]error=)/.test(search);
        var isEmailReturn =
          /(?:[?&]token_hash=|[?&]type=(signup|recovery|email|magiclink|invite))/.test(search) ||
          /type=(signup|recovery|email|magiclink|invite)/.test(hash) ||
          (/access_token=/.test(hash) && !/(?:[?&]code=)/.test(search));
        var isAuthReturn = isOAuthReturn || isEmailReturn;
        if (!isAuthReturn) return;

        if (isPreview) {
          window.location.replace(CANONICAL + '/characters' + search + hash);
          return;
        }

        var path = window.location.pathname || '/';
        if (path === '/characters') return;
        if (path === '/' || path === '' || path === '/game') {
          window.location.replace(
            window.location.origin + '/characters' + search + hash,
          );
        }
      })();
    </script>
  </head>
  <body data-react-auth-ui="1" data-react-char-select-ui="1">
    <div id="login-screen" class="screen full-screen hidden" aria-hidden="true"></div>

    <div id="char-select-screen" class="screen full-screen hidden" aria-hidden="true"></div>

    <div id="screen-react-root" class="screen-react-root hidden" aria-hidden="true"></div>

    <div id="auth-bootstrap-retry" class="auth-bootstrap-retry hidden" aria-hidden="true">
      <button type="button" data-auth-bootstrap-retry>Tentar novamente</button>
    </div>

    <div id="game-container" class="screen">
      <div id="scene-exploration" class="scene hidden">
        <div id="vortex-app" class="app-wrapper game-layout">
          <div id="game-viewport" class="game-viewport-container game-layout__viewport" aria-label="Viewport do jogo">
            <div id="game-stage-frame" class="game-stage-frame">
              <!-- Core de layout: container 640×360 — escala CSS aplicada aqui (spec: #game-container) -->
              <div id="game-stage-scale" class="game-stage-scale">
                <main id="game-stage">
                  <div id="game-render-host" class="game-render-host" data-render-engine="canvas-legacy">
                    <canvas id="game-canvas" class="game-canvas" width="640" height="360" aria-label="Mundo Altercadia"></canvas>
                    <div id="phaser-mount-root" class="phaser-mount-root hidden" aria-hidden="true"></div>
                  </div>
                </main>
              </div>
              <div id="npc-names-layer" class="npc-names-layer" aria-hidden="true"></div>
              <div id="speech-bubbles-layer" class="speech-bubbles-layer" aria-hidden="true"></div>
              <div id="game-ui-overlay" class="game-ui-overlay" aria-label="HUD do mundo">
                <div id="ui-layer" class="ui-layer" aria-label="Camada de interface legado"></div>
              </div>
            </div>
          </div>

          <aside id="sidebar" class="sidebar game-layout__sidebar hidden" aria-hidden="true"></aside>
        </div>
      </div>

      <div id="scene-combat" class="scene hidden">
        <div id="battle-fade-overlay" class="battle-fade-overlay hidden" aria-hidden="true"></div>

        <div class="battle-screen battle-screen--terminal battle-screen--side-view" data-battle-hud>
          <!-- TOP: Área de combate Side-View -->
          <section class="battle-combat-top" aria-label="Área de combate">
            <div class="battle-status-row">
              <header class="battle-sprite-hud battle-sprite-hud--ally" aria-label="Jogador">
                <p id="battle-player-name" class="battle-fighter-name">—</p>
                <p id="battle-player-class" class="battle-fighter-class">—</p>
                <div class="battle-hp-bar" role="progressbar" aria-label="HP do jogador">
                  <div id="battle-player-hp-fill" class="battle-hp-bar__fill"></div>
                </div>
                <p id="battle-player-hp-text" class="battle-hp-text">— / —</p>
                <div id="battle-player-status" class="battle-status-row status-container status-container--ally" aria-label="Status do jogador"></div>
              </header>

              <div class="battle-turn-hub" aria-live="polite">
                <p id="battle-turn-phase" class="battle-turn-phase battle-turn-phase--waiting">Aguardando…</p>
                <p id="battle-turn-waiting" class="battle-turn-waiting hidden">Aguardando ação do oponente…</p>
                <div class="battle-turn-timer-track" role="progressbar" aria-label="Tempo restante do turno">
                  <div id="battle-turn-timer-bar-fill" class="battle-turn-timer-bar__fill"></div>
                </div>
                <div class="battle-timer-ring">
                  <span id="battle-turn-timer" class="battle-turn-timer">10</span>
                </div>
              </div>

              <header class="battle-sprite-hud battle-sprite-hud--foe" aria-label="Oponente">
                <p id="battle-opponent-name" class="battle-fighter-name">—</p>
                <p id="battle-opponent-class" class="battle-fighter-class">—</p>
                <div class="battle-hp-bar battle-hp-bar--enemy" role="progressbar" aria-label="HP do oponente">
                  <div id="battle-opponent-hp-fill" class="battle-hp-bar__fill"></div>
                </div>
                <p id="battle-opponent-hp-text" class="battle-hp-text">— / —</p>
                <div id="battle-opponent-status" class="battle-status-row status-container" aria-label="Status do oponente"></div>
              </header>
            </div>

            <div class="battle-arena" aria-label="Cenário de combate">
              <div class="battle-arena__floor" aria-hidden="true"></div>
              <div class="battle-arena__effects" data-battle-effects-layer aria-hidden="true"></div>
              <div class="battle-arena__stage">
                <div class="battle-platform battle-platform--ally" data-battle-platform="ally">
                  <div class="battle-arena__ally-group">
                    <div class="battle-ally-formation">
                      <div id="battle-player-portrait" class="battle-portrait battle-portrait--player battle-fighter" data-side="player">
                        <span class="battle-portrait__silhouette" aria-hidden="true"></span>
                      </div>
                      <div id="battle-pet-panel" class="battle-pet-fighter hidden" data-side="pet" aria-label="Companheiro">
                        <div class="battle-pet-fighter__body">
                          <canvas id="battle-pet-portrait" class="battle-pet-fighter__sprite" width="96" height="96" aria-hidden="true"></canvas>
                        </div>
                        <div class="battle-pet-fighter__vitals">
                          <p id="battle-pet-name" class="battle-pet-fighter__name">—</p>
                          <div class="battle-hp-bar battle-hp-bar--pet" role="progressbar" aria-label="HP do pet">
                            <div id="battle-pet-hp-fill" class="battle-hp-bar__fill"></div>
                          </div>
                          <p id="battle-pet-hp-text" class="battle-hp-text battle-pet-fighter__hp">— / —</p>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
                <p class="battle-vs-label" aria-hidden="true">VS</p>
                <div class="battle-platform battle-platform--foe" data-battle-platform="foe">
                  <div id="battle-opponent-portrait" class="battle-portrait battle-portrait--opponent battle-fighter" data-side="opponent">
                    <span class="battle-portrait__silhouette" aria-hidden="true"></span>
                  </div>
                </div>
              </div>
            </div>
          </section>

          <!-- MIDDLE: Barra de comandos -->
          <section class="battle-command-middle" aria-label="Comandos">
            <nav class="battle-command-bar">
              <button type="button" class="battle-cmd-btn" data-battle-cmd="moveset">Moveset</button>
              <button type="button" class="battle-cmd-btn" data-battle-cmd="items">Itens</button>
              <button type="button" class="battle-cmd-btn" data-battle-cmd="skip">Pular</button>
              <button type="button" class="battle-cmd-btn battle-cmd-btn--danger" data-battle-cmd="surrender" title="Fugir da batalha — penalidade −20 VOLTS">Render-se</button>
            </nav>
            <div id="skill-palette-row" class="skill-palette battle-skill-slots battle-moveset-drawer hidden" data-hud-skill-actions aria-label="Moveset"></div>
            <div id="battle-items-row" class="skill-palette battle-items-drawer hidden" data-hud-battle-items aria-label="Consumíveis de combate"></div>
          </section>

          <!-- BOTTOM: BattleLog | BattleChat -->
          <footer class="battle-terminal-footer">
            <section class="battle-log-panel terminal-panel" aria-label="Battle Log">
              <h2 class="battle-panel-title"><span class="terminal-prompt">&gt;</span> BATTLE_LOG</h2>
              <div id="battle-log" class="battle-log battle-log--mono"></div>
            </section>
            <section id="battle-chat" class="battle-chat-panel terminal-panel" aria-label="Battle Chat">
              <h2 class="battle-panel-title"><span class="terminal-prompt">&gt;</span> BATTLE_CHAT</h2>
              <div id="battle-chat-content" class="battle-chat-content"></div>
              <form id="battle-chat-form" class="battle-chat-form">
                <span class="terminal-prompt" aria-hidden="true">&gt;</span>
                <input id="battle-chat-input" type="text" placeholder="msg..." maxlength="120" autocomplete="off" aria-label="Mensagem de batalha" />
                <button type="submit" class="battle-chat-send">SEND</button>
              </form>
            </section>
          </footer>
        </div>
      </div>

      <div id="scene-transition" class="scene scene-transition loading-overlay hidden" aria-hidden="true" aria-label="Carregando">
        <div class="scene-transition__inner">
          <div class="scene-transition__spinner" aria-hidden="true"></div>
          <p class="scene-transition__label">Carregando…</p>
        </div>
      </div>

      <div id="pause-menu" class="hidden" aria-hidden="true">
        <div class="pause-menu-panel vortex-panel">
          <h2>PAUSA</h2>
          <button id="btn-pause-settings" type="button">Configurações</button>
          <button id="btn-pause-exit" type="button">Sair do Jogo</button>
        </div>
      </div>

      <div id="game-react-hud-root" class="game-react-hud-root" aria-hidden="true"></div>
      <div id="game-react-overlay-root" class="game-react-overlay-root" aria-hidden="true"></div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2/+esm",
          "gsap": "/vendor/gsap/index.js",
          "zustand": "https://cdn.jsdelivr.net/npm/zustand@5.0.14/+esm",
          "zustand/": "https://cdn.jsdelivr.net/npm/zustand@5.0.14/"
        }
      }
    </script>
    <script type="module" src="/app-ui/ui-runtime.js"></script>
    <script type="module" src="/client/browser/main.js"></script>
  </body>
</html>
