<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Altercadia.online</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/app-ui/ui-runtime.css" />
    <link rel="modulepreload" href="/app-ui/ui-runtime.js" />
    <script>
      (function () {
        var CANONICAL = 'https://altercadia-online.vercel.app';
        var search = window.location.search;
        var hash = window.location.hash || '';
        var host = window.location.hostname || '';
        var isPreview =
          host.indexOf('-projects.vercel.app') !== -1 ||
          (host.slice(-12) === '.vercel.app' && host !== 'altercadia-online.vercel.app');
        var isOAuthReturn =
          /(?:[?&]code=|[?&]error=)/.test(search);
        var isEmailReturn =
          /(?:[?&]token_hash=|[?&]type=(signup|recovery|email|magiclink|invite))/.test(search) ||
          /type=(signup|recovery|email|magiclink|invite)/.test(hash) ||
          (/access_token=/.test(hash) && !/(?:[?&]code=)/.test(search));
        var isAuthReturn = isOAuthReturn || isEmailReturn;
        if (!isAuthReturn) return;

        if (isPreview) {
          window.location.replace(CANONICAL + '/characters' + search + hash);
          return;
        }

        var path = window.location.pathname || '/';
        if (path === '/characters') return;
        if (path === '/' || path === '' || path === '/game') {
          window.location.replace(
            window.location.origin + '/characters' + search + hash,
          );
        }
      })();
    </script>
  </head>
  <body data-react-auth-ui="1" data-react-char-select-ui="1">
    <div id="login-screen" class="screen full-screen hidden" aria-hidden="true"></div>

    <div id="char-select-screen" class="screen full-screen hidden" aria-hidden="true"></div>

    <div id="screen-react-root" class="screen-react-root hidden" aria-hidden="true"></div>

    <div id="auth-bootstrap-retry" class="auth-bootstrap-retry hidden" aria-hidden="true">
      <button type="button" data-auth-bootstrap-retry>Tentar novamente</button>
    </div>

    <div id="game-container" class="screen">
      <!-- Coluna de render compartilhada — persiste entre exploração e combate (Phaser não é destruído). -->
      <div id="game-render-column" class="game-render-column" aria-label="Viewport do jogo">
        <div id="game-viewport" class="game-viewport-container game-layout__viewport">
          <div id="game-stage-frame" class="game-stage-frame">
            <!-- Core de layout: container 640×360 — escala CSS aplicada aqui (spec: #game-container) -->
            <div id="game-stage-scale" class="game-stage-scale">
              <main id="game-stage">
                <div id="game-render-host" class="game-render-host" data-render-engine="canvas-legacy">
                  <canvas id="game-canvas" class="game-canvas" width="640" height="360" aria-label="Mundo Altercadia"></canvas>
                  <div id="phaser-mount-root" class="phaser-mount-root hidden" aria-hidden="true"></div>
                </div>
              </main>
            </div>
            <div id="npc-names-layer" class="npc-names-layer" aria-hidden="true"></div>
            <div id="speech-bubbles-layer" class="speech-bubbles-layer" aria-hidden="true"></div>
            <div id="game-ui-overlay" class="game-ui-overlay" aria-label="HUD do mundo">
              <div id="ui-layer" class="ui-layer" aria-label="Camada de interface legado"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Fade compartilhado — exploração ↔ batalha (ramo Phaser); cobre #game-render-column -->
      <div id="game-scene-fade-overlay" class="game-scene-fade-overlay hidden" aria-hidden="true"></div>

      <div id="scene-exploration" class="scene hidden">
        <div id="vortex-app" class="app-wrapper game-layout">
          <div class="game-layout__viewport-spacer" aria-hidden="true"></div>
          <aside id="sidebar" class="sidebar game-layout__sidebar hidden" aria-hidden="true"></aside>
        </div>
      </div>

      <div id="scene-combat" class="scene hidden">
        <div id="battle-fade-overlay" class="battle-fade-overlay hidden" aria-hidden="true"></div>

        <div class="battle-screen battle-screen--terminal battle-screen--side-view" data-battle-hud>
          <section class="battle-combat-top" aria-label="Área de combate">
            <div class="battle-arena" aria-label="Cenário de combate">
              <div class="battle-arena__floor" aria-hidden="true"></div>
              <div class="battle-arena__effects" data-battle-effects-layer aria-hidden="true"></div>
              <div class="battle-arena__stage">
                <div class="battle-platform battle-platform--ally" data-battle-platform="ally">
                  <div class="battle-arena__ally-group">
                    <div class="battle-ally-formation">
                      <div id="battle-player-portrait" class="battle-portrait battle-portrait--player battle-fighter" data-side="player">
                        <span class="battle-portrait__silhouette" aria-hidden="true"></span>
                      </div>
                      <div id="battle-pet-panel" class="battle-pet-fighter hidden" data-side="pet" aria-hidden="true"></div>
                    </div>
                  </div>
                </div>
                <p class="battle-vs-label" aria-hidden="true">VS</p>
                <div class="battle-platform battle-platform--foe" data-battle-platform="foe">
                  <div id="battle-opponent-portrait" class="battle-portrait battle-portrait--opponent battle-fighter" data-side="opponent">
                    <span class="battle-portrait__silhouette" aria-hidden="true"></span>
                  </div>
                </div>
              </div>
            </div>
          </section>
        </div>
      </div>

      <div id="scene-transition" class="scene scene-transition loading-overlay hidden" aria-hidden="true" aria-label="Carregando">
        <div class="scene-transition__inner">
          <div class="scene-transition__spinner" aria-hidden="true"></div>
          <p class="scene-transition__label">Carregando…</p>
        </div>
      </div>

      <div id="pause-menu" class="hidden" aria-hidden="true">
        <div class="pause-menu-panel vortex-panel">
          <h2>PAUSA</h2>
          <button id="btn-pause-settings" type="button">Configurações</button>
          <button id="btn-pause-exit" type="button">Sair do Jogo</button>
        </div>
      </div>

      <div id="game-react-hud-root" class="game-react-hud-root" aria-hidden="true"></div>
      <div id="game-react-overlay-root" class="game-react-overlay-root" aria-hidden="true"></div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2/+esm",
          "gsap": "/vendor/gsap/index.js",
          "zustand": "https://cdn.jsdelivr.net/npm/zustand@5.0.14/+esm",
          "zustand/": "https://cdn.jsdelivr.net/npm/zustand@5.0.14/"
        }
      }
    </script>
    <script type="module" src="/app-ui/ui-runtime.js"></script>
    <script type="module" src="/client/browser/main.js"></script>
  </body>
</html>
