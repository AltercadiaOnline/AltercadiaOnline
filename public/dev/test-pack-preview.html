<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Altercadia — Test Pack Preview</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #1a1a22;
      color: #e8dcc8;
      font-family: system-ui, sans-serif;
      padding: 16px;
    }
    h1 { font-size: 1rem; margin: 0 0 12px; }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 1px solid #444;
      background: #0d0d12;
    }
    #status { margin-top: 8px; font-size: 12px; color: #9ab; }
  </style>
</head>
<body>
  <h1>Pack testes.01.assets.free — preview local (32×32)</h1>
  <canvas id="c" width="640" height="360"></canvas>
  <div id="status">Carregando…</div>
  <script type="module">
    const TILE = 40;
    const samples = [
      { label: 'road', url: '/assets/testes.01.assets.free/craftpix-891123-free-pixel-art-street-2d-backgrounds/PNG/City3/Bright/road.png' },
      { label: 'crosswalk', url: '/assets/testes.01.assets.free/craftpix-891123-free-pixel-art-street-2d-backgrounds/PNG/City3/Bright/crosswalk.png' },
      { label: 'grass', url: '/assets/testes.01.assets.free/craftpix-net-574220-free-path-and-road-top-down-pixel-tileset/PNG/Tiled/ground_grass.png' },
      { label: 'buildings', url: '/assets/testes.01.assets.free/craftpix-891123-free-pixel-art-street-2d-backgrounds/PNG/City1/Bright/buildings.png' },
      { label: 'bush', url: '/assets/testes.01.assets.free/craftpix-net-141354-free-top-down-bushes-pixel-art/PNG/Assets/Bush_simple1_1.png' },
      { label: 'wall', url: '/assets/testes.01.assets.free/craftpix-891123-free-pixel-art-street-2d-backgrounds/PNG/City1/Bright/wall1.png' },
    ];

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    ctx.imageSmoothingEnabled = false;

    function load(url) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = url;
      });
    }

    const images = await Promise.all(samples.map(async (sample) => ({
      ...sample,
      img: await load(sample.url),
    })));

    const ok = images.filter((row) => row.img);
    images.forEach((row, index) => {
      const col = index % 8;
      const rowIdx = Math.floor(index / 8);
      const x = col * TILE;
      const y = rowIdx * TILE;
      if (row.img) {
        ctx.drawImage(row.img, 0, 0, row.img.naturalWidth, row.img.naturalHeight, x, y, TILE, TILE);
        ctx.fillStyle = '#e8dcc8';
        ctx.font = '8px monospace';
        ctx.fillText(row.label, x + 2, y + 10);
      } else {
        ctx.fillStyle = '#c44';
        ctx.fillRect(x, y, TILE, TILE);
      }
    });

    // Mini grid simulando ruas + grama
    const gridY = 80;
    for (let gy = 0; gy < 6; gy++) {
      for (let gx = 0; gx < 16; gx++) {
        const isRoad = gx === 7 || gx === 8;
        const img = isRoad ? images[0]?.img : images[2]?.img;
        if (img) {
          ctx.drawImage(img, 0, 0, img.naturalWidth, img.naturalHeight, gx * TILE, gridY + gy * TILE, TILE, TILE);
        }
      }
    }

    status.textContent = `OK ${ok.length}/${samples.length} PNGs carregados do pack local — servidor em ${location.origin}`;
  </script>
</body>
</html>
