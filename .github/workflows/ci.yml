name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: CI check (typecheck, test, lint, build)
        run: npm run ci:check

  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Smoke E2E (produção Vercel)
        env:
          PLAYWRIGHT_BASE_URL: https://altercadia-online.vercel.app
        run: npm run test:e2e

  vercel-deploy-hook:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Vercel Deploy Hook (fallback Git webhook)
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL secret ausente — pulando hook (só webhook Git)."
            exit 0
          fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
          echo ""
          echo "Vercel deploy hook disparado."
